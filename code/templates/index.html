<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ravenSDR Console</title>
    <link rel="stylesheet" href="/static/ravensdr.css">
    <link rel="stylesheet" href="/static/map.css">
    <link rel="stylesheet" href="/static/satellite.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
</head>
<body>
    <header>
        <h1>ravenSDR <span id="mode-badge" class="badge">--</span></h1>
        <div id="connection-banner" class="banner hidden">Connecting...</div>
        <div id="error-banner" class="banner banner-error hidden">
            <span class="error-message"></span>
            <button id="retry-btn" class="btn btn-sm btn-retry">Retry</button>
        </div>
    </header>

    <main>
        <!-- Preset Selector -->
        <section id="preset-section">
            <div id="category-tabs" class="tabs"></div>
            <div id="preset-buttons" class="preset-grid"></div>
        </section>

        <!-- Signal Meter -->
        <section id="signal-section">
            <label>Signal</label>
            <div class="meter-container">
                <div id="signal-bar" class="meter-bar"></div>
            </div>
            <span id="signal-rms" class="meter-value">0</span>
        </section>

        <!-- Inference Stats -->
        <section id="stats-section">
            <label>Inference</label>
            <div class="stats-grid">
                <div class="stat">
                    <span class="stat-label">Backend</span>
                    <span class="stat-value" id="stat-backend">&mdash;</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Latency</span>
                    <span class="stat-value" id="stat-latency">&mdash;</span>
                </div>
                <div class="stat">
                    <span class="stat-label">RTF</span>
                    <span class="stat-value" id="stat-rtf">&mdash;</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Tok/s</span>
                    <span class="stat-value" id="stat-tps">&mdash;</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Decoder</span>
                    <span class="stat-value" id="stat-decoder">&mdash;</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Chunks</span>
                    <span class="stat-value" id="stat-chunks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Silence</span>
                    <span class="stat-value" id="stat-silence">0%</span>
                </div>
            </div>
        </section>

        <!-- Controls -->
        <section id="control-section">
            <div class="control-group">
                <label for="squelch-slider">Squelch <span class="info-icon" title="Mutes audio below this signal level. Increase to filter out static and noise when no one is transmitting.">i</span></label>
                <input type="range" id="squelch-slider" min="0" max="100" value="0">
                <span id="squelch-value">0</span>
            </div>
            <div class="control-group">
                <label for="gain-select">Gain <span class="info-icon" title="Controls SDR receiver amplification. Auto adjusts dynamically. Increase manually for weak signals, decrease if audio is distorted.">i</span></label>
                <select id="gain-select">
                    <option value="auto" selected>Auto</option>
                    <option value="0">0 dB</option>
                    <option value="10">10 dB</option>
                    <option value="20">20 dB</option>
                    <option value="30">30 dB</option>
                    <option value="40">40 dB</option>
                    <option value="50">50 dB</option>
                </select>
            </div>
            <button id="stop-btn" class="btn btn-stop" disabled>Stop</button>
            <button id="advanced-toggle" class="btn btn-sm btn-advanced">Advanced</button>
        </section>

        <!-- Advanced SDR Settings (collapsible) -->
        <div id="advanced-panel" class="advanced-panel hidden">
            <div class="advanced-grid">
                <div class="control-group">
                    <label for="sample-rate-select">Sample Rate <span class="info-icon" title="Capture bandwidth. Wider = more spectrum but more noise.">i</span></label>
                    <select id="sample-rate-select">
                        <option value="" selected>Auto (200k)</option>
                        <option value="170k">170k</option>
                        <option value="200k">200k</option>
                        <option value="256k">256k</option>
                        <option value="1024k">1024k</option>
                        <option value="2048k">2048k</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>De-emphasis <span class="info-icon" title="Reduces high-frequency hiss on FM signals. Auto = ON for FM modes.">i</span></label>
                    <div class="toggle-group">
                        <span class="toggle-label-text" id="deemp-label">Auto</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="deemp-toggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div class="control-group">
                    <label for="ppm-input">PPM <span class="info-icon" title="Crystal frequency correction. Blog V4 TCXO = 0.">i</span></label>
                    <input type="number" id="ppm-input" class="control-number" value="0" min="-200" max="200" step="1">
                </div>
                <div class="control-group">
                    <label for="direct-sampling-select">Direct Samp <span class="info-icon" title="For HF reception below 24 MHz. Off for normal VHF/UHF.">i</span></label>
                    <select id="direct-sampling-select">
                        <option value="0" selected>Off</option>
                        <option value="1">I-branch</option>
                        <option value="2">Q-branch</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Resample <span class="info-icon" title="Output sample rate, fixed at 16 kHz for Whisper compatibility.">i</span></label>
                    <span class="control-readonly" id="resample-display">16k</span>
                </div>
            </div>
        </div>

        <!-- Audio Player -->
        <section id="audio-section">
            <label>Audio</label>
            <div class="audio-controls">
                <button id="audio-toggle" class="btn" disabled>Play Audio</button>
                <span id="audio-status" class="status-text">No source</span>
            </div>
            <audio id="audio-player" preload="none"></audio>
        </section>

        <!-- Now Tuned -->
        <section id="tuned-section">
            <span id="tuned-label" class="tuned-info">Not tuned</span>
            <span id="tuned-freq" class="tuned-freq"></span>
        </section>

        <!-- Transcript Feed -->
        <section id="transcript-section">
            <div class="transcript-header">
                <label>Transcript</label>
                <div>
                    <button id="clear-btn" class="btn btn-sm">Clear</button>
                    <button id="copy-btn" class="btn btn-sm">Copy</button>
                </div>
            </div>
            <div id="transcript-feed" class="transcript-feed"></div>
        </section>

        <!-- Weather Panel -->
        <div id="weather-panel" class="hidden">
            <div class="panel-header">
                <label>Weather</label>
                <button id="weather-toggle-btn" class="btn btn-sm">Hide</button>
            </div>
            <div class="weather-content"></div>
        </div>

        <!-- Satellite Panel -->
        <div id="satellite-panel" class="hidden">
            <div class="panel-header">
                <label>Satellite Passes</label>
            </div>

            <div class="sat-countdown-wrap">
                <span class="sat-countdown-label">Next pass</span>
                <span id="sat-countdown">--:--:--</span>
                <span id="sat-next-label"></span>
            </div>

            <div id="sat-recording-indicator" class="hidden">
                <span class="sat-rec-dot"></span>
                <span class="sat-rec-text">Recording satellite pass...</span>
                <div class="sat-progress-bar">
                    <div id="sat-recording-progress"></div>
                </div>
            </div>

            <div id="sat-pass-list"></div>

            <div id="sat-latest-image"></div>
            <div id="sat-image-history"></div>
        </div>

        <!-- ADS-B Map Panel -->
        <div id="adsb-panel" class="hidden">
            <div class="panel-header">
                <label>ADS-B Aircraft Map</label>
                <span id="flight-count" class="flight-count">0 aircraft</span>
            </div>
            <div id="adsb-scan-status">Scanning ADS-B...</div>
            <div id="adsb-map"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.js"></script>
    <script src="/static/map.js"></script>
    <script src="/static/weather.js"></script>
    <script src="/static/satellite.js"></script>
    <script src="/static/ravensdr.js"></script>
</body>
</html>
